<!DOCTYPE html>
<html>
<head>
    <title>CHD-CARE (NCOMMS-26-037516)</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root {
            --primary-color: #3a7bd5;
            --primary-dark: #3069b4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-btn {
            padding: 20px 60px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.3);
        }
        .login-btn:hover {
            filter: brightness(1.1);
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(58, 123, 213, 0.4);
        }

        /* 登录弹窗 */
        .login-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .login-modal.show { display: flex; }
        .login-modal-card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 380px;
            max-width: 90%;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-modal-card .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #999;
            padding: 5px 10px;
            transition: color 0.3s;
        }
        .login-modal-card .close-btn:hover { color: #333; }
        .login-modal-card h2 {
            margin-bottom: 25px;
            text-align: center;
            font-size: 24px;
            color: #333;
        }
        .login-modal-card .form-group {
            margin-bottom: 18px;
        }
        .login-modal-card .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        .login-modal-card .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        .login-modal-card .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        .login-modal-card .login-btn {
            width: 100%;
            padding: 14px 24px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .login-modal-card .login-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .login-modal-card .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .login-modal-card .error-msg {
            background: #fdf0f0;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
            text-align: center;
        }
        .login-modal-card .error-msg.show { display: block; }
    </style>
</head>
<body>
    <div style="background: linear-gradient(135deg, #3a7bd5 0%, #2c5aa0 100%); padding: 12px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); width: 100%; position: fixed; top: 0; left: 0; z-index: 100;">
        <span style="color: white; font-size: 20px; font-weight: 700; letter-spacing: 1px;">CHD-CARE (NCOMMS-26-037516)</span>
    </div>
    <div style="padding-top: 60px; width: 100%; display: flex; justify-content: center; align-items: center;">
        <button class="login-btn" id="loginBtnTitle" data-i18n="login.clickToLogin" onclick="openLoginModal()">Click to Login</button>
    </div>

    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
        <div class="login-modal-card">
            <span class="close-btn" onclick="closeLoginModal()">&times;</span>
            <h2 data-i18n="login.loginBtn">Login</h2>
            <div class="error-msg" id="loginError"></div>
            <div class="form-group">
                <label data-i18n="login.usernameLabel">Username</label>
                <input type="text" id="loginUsername" data-i18n-placeholder="login.usernamePlaceholder" placeholder="Please enter username" required>
            </div>
            <div class="form-group">
                <label data-i18n="login.passwordLabel">Password</label>
                <input type="password" id="loginPassword" data-i18n-placeholder="login.passwordPlaceholder" placeholder="Please enter password" required>
            </div>
            <button class="login-btn" id="loginBtn" onclick="doLogin()" data-i18n="login.loginBtn">Login</button>
        </div>
    </div>

    <script>
        var i18n = {};
        var langConfig = {};

        async function loadI18n() {
            try {
                const resp = await fetch('UI/i18n/lang_config.json');
                langConfig = await resp.json();
                const resp2 = await fetch('UI/i18n/' + langConfig.current + '.json');
                i18n = await resp2.json();
                applyI18n();
            } catch (e) {
                console.error('Failed to load i18n:', e);
            }
        }

        function t(key, fallback) {
            const keys = key.split('.');
            let val = i18n;
            for (const k of keys) {
                val = val?.[k];
            }
            return val ?? fallback ?? key;
        }

        function applyI18n() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.textContent = t(key, el.textContent);
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                el.placeholder = t(key, el.placeholder);
            });
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('show');
            document.getElementById('loginUsername').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('show');
        }

        document.getElementById('loginModal').addEventListener('click', function(e) {
            if (e.target === this) closeLoginModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLoginModal();
        });

        function showLoginError(msg) {
            var el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 5000);
        }

        async function doLogin() {
            var username = document.getElementById('loginUsername').value.trim();
            var password = document.getElementById('loginPassword').value;
            var btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showLoginError(t('login.fillBothFields', 'Please fill in username and password'));
                return;
            }

            btn.disabled = true;
            btn.textContent = t('login.loginBtnLoading', 'Logging in...');

            try {
                var res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                var data = await res.json();
                if (!res.ok) throw new Error(data.detail || t('login.loginFailed', 'Login failed'));
                localStorage.setItem('userData', JSON.stringify(data.data));
                window.location.href = '/flow';
            } catch (e) {
                showLoginError(e.message);
                btn.disabled = false;
                btn.textContent = t('login.loginBtn', 'Login');
            }
        }

        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doLogin();
        });

        loadI18n();
    </script>
</body>
</html>
