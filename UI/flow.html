<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title data-i18n="flowTitle">Welcome - CHD-AIDE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #f6f8ff 0%, #ffffff 100%);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 1320px;
      min-height: 384px;
      background: white;
      border-radius: 12px;
      padding: 36px;
      box-shadow: 0 8px 30px rgba(41, 56, 86, 0.08);
    }
    .header {
      display:flex;
      align-items:center;
      gap:18px;
      margin-bottom:18px;
    }
    .avatar {
      width:80px; height:80px; border-radius:40px;
      background: linear-gradient(135deg,#667eea 0%,#764ba2 100%);
      color:white; display:flex; align-items:center; justify-content:center;
      font-size:32px; font-weight:700;
    }
    .userinfo { display:flex; flex-direction:column; }
    .welcome { font-size:26px; font-weight:700; color:#1f2937; }
    .meta { color:#6b7280; font-size:16px; margin-top:6px; }
    .buttons { display:flex; flex-wrap:wrap; margin-top:24px; gap:24px; justify-content:space-between; align-items:center; }
    .btn {
      padding:20px 32px; border-radius:10px; border:none; cursor:pointer; font-weight:600; font-size:18px;
      background:linear-gradient(90deg,#667eea 0%,#5b8def 100%); color:#fff;
      box-shadow: 0 6px 18px rgba(102,126,234,0.12);
      transition: all 0.2s;
    }
    .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .btn.secondary {
      background: linear-gradient(90deg,#10b981 0%,#14c38e 100%);
      box-shadow: 0 6px 18px rgba(20,195,142,0.12);
    }
    .btn.ghost {
      background: transparent; border:1px solid #e6eefc; color:#374151;
      box-shadow: none;
    }
    .actions { display:flex; justify-content:flex-end; margin-top:22px; gap:12px; }
    .hint { color:#6b7280; margin-top:8px; font-size:13px; }
    @media (max-width:720px) {
      .header { flex-direction:column; align-items:flex-start; gap:8px; }
      .buttons { flex-direction:column; }
      .actions { justify-content:center; }
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0.3;
      z-index: -2;
      pointer-events: none;
    }
    body.has-bg::before {
      background-image: var(--bg-image, none);
    }
    .title-overlay {
      position: fixed;
      top: 20px;
      left: 30px;
      z-index: -1;
      pointer-events: none;
    }
    .title-overlay h1 {
      font-size: 28px;
      color: #1e293b;
      text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
      margin: 0;
    }
    .title-overlay p {
      font-size: 14px;
      color: #64748b;
      margin: 5px 0 0 0;
    }
  </style>
</head>
<body>
  <div class="title-overlay" id="titleOverlay">
    <h1 id="bg-title"></h1>
    <p id="bg-subtitle"></p>
  </div>
  <div class="card" role="main">
    <div class="header">
      <div id="avatar" class="avatar">U</div>
      <div class="userinfo">
        <div id="welcomeText" class="welcome" data-i18n="welcomeBack">Welcome back</div>
        <div id="orgText" class="meta" data-i18n="organization">Organization: Loading...</div>
      </div>
      <div style="flex:1"></div>
      <div>
        <button id="logoutBtn" class="btn ghost" data-i18n="logout">Logout</button>
      </div>
    </div>

    <div class="hint" style="font-size:18px;margin-bottom:12px;" data-i18n="selectMode">Please select a mode to start:</div>

    <div class="buttons" role="navigation" aria-label="mode-buttons">
      <div style="display:flex;gap:24px;flex-wrap:wrap;">
        <button id="diagnoseBtn" class="btn" data-desc-key="diagnoseBtn" data-i18n="diagnoseMode">Diagnosis Mode</button>
        <button id="usersBtn" class="btn ghost" style="display: none;" data-desc-key="usersBtn" data-i18n="userManagement">User Management</button>
      </div>
      <div style="color:#6b7280;font-size:13px;white-space:nowrap;" data-i18n="switchAccountHint">To switch accounts, please logout and login again.</div>
    </div>

    <div id="buttonDesc" style="color:#6b7280;font-size:16px;min-height:24px;margin-top:12px;" data-i18n="selectFunction">Please select a function</div>
  </div>

  <script>
    (function () {
      const welcomeText = document.getElementById('welcomeText');
      const orgText = document.getElementById('orgText');
      const avatar = document.getElementById('avatar');

      const diagnoseBtn = document.getElementById('diagnoseBtn');
      const usersBtn = document.getElementById('usersBtn');
      const logoutBtn = document.getElementById('logoutBtn');
      const buttonDesc = document.getElementById('buttonDesc');
      const allButtons = [diagnoseBtn, usersBtn, logoutBtn];
      let buttonDescriptions = {
        diagnoseBtn: 'Enter diagnosis mode for formal case diagnosis',
        usersBtn: 'Manage system users',
        logoutBtn: 'Logout from current account'
      };

      async function loadI18n() {
        try {
          const configRes = await fetch('/UI/i18n/lang_config.json');
          const config = await configRes.json();
          const i18nRes = await fetch('/UI/i18n/' + config.current + '.json');
          const i18n = await i18nRes.json();
          document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (i18n[key]) el.textContent = i18n[key];
          });
          if (i18n.buttonDescriptions) {
            buttonDescriptions = { ...buttonDescriptions, ...i18n.buttonDescriptions };
          }
        } catch (e) {
          console.warn('i18n load failed, using defaults');
        }
      }

      function getCookieValue(name) {
        const cookies = document.cookie ? document.cookie.split('; ') : [];
        for (let c of cookies) {
          const [k, ...v] = c.split('=');
          if (k === name) return decodeURIComponent(v.join('='));
        }
        return null;
      }

      let avatarConfig = { avatars: {} };
      async function loadAvatarConfig() {
        try {
          const r = await fetch('/UI/res/share/user_avatar_config.json');
          if (r.ok) {
            avatarConfig = await r.json();
          }
        } catch (e) {
          console.warn('Avatar config load failed');
        }
      }

      async function setUserAvatar(avatarElem, username) {
        const avatarPath = avatarConfig.avatars[username];
        if (avatarPath) {
            avatarElem.innerHTML = `<img src="/UI/${avatarPath}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.parentElement.textContent='${username ? username[0].toUpperCase() : 'U'}'">`;
        } else {
            avatarElem.textContent = username ? username[0].toUpperCase() : 'U';
        }
      }

      function setupButtonHoverEvents() {
        allButtons.forEach(btn => {
          if (!btn) return;
          btn.addEventListener('mouseenter', () => {
            const key = btn.getAttribute('data-desc-key');
            if (key && buttonDescriptions[key]) {
              buttonDesc.textContent = buttonDescriptions[key];
            }
          });
          btn.addEventListener('mouseleave', () => {
            const key = 'selectFunction';
            buttonDesc.textContent = buttonDescriptions[key] || 'Please select a function';
          });
        });
      }

      async function loadUser() {
        await loadAvatarConfig();
        await loadI18n();
        setupButtonHoverEvents();

        let isAdmin = false;
        let uname = getCookieValue('username') || getCookieValue('user') || 'unknown';
        let org = '';

        let doctor = '';
        try {
          const resp = await fetch('/api/users/current');
          if (resp.ok) {
            const body = await resp.json().catch(()=>null);
            if (body && body.data) {
              const u = body.data;
              uname = u.username || u.user || u.login || u.name || uname;
              org = u.organization || u.org || u.organizationName || u.department || '';
              doctor = u.doctor || u.name || '';
              isAdmin = u.is_admin === true;
            }
          }
        } catch (e) {
        }

        applyUser(uname, org, isAdmin, doctor);
      }

      function applyUser(username, org, isAdmin, doctor) {
        const uname = username || 'unknown';
        const displayName = doctor || uname;
        welcomeText.textContent = buttonDescriptions.welcomeBack.replace('{name}', displayName) || `Welcome back, ${displayName}`;
        orgText.textContent = org ? `${buttonDescriptions.organization || 'Organization'}: ${org}` : (buttonDescriptions.unknownOrg || 'Organization: Unknown');
        setUserAvatar(avatar, uname);

        if (isAdmin) {
          usersBtn.style.display = 'inline-block';
        } else {
          usersBtn.style.display = 'none';
        }
      }

      diagnoseBtn.addEventListener('click', () => { window.location.href = '/dashboard'; });
      usersBtn.addEventListener('click', () => { window.location.href = '/admin'; });

      logoutBtn.addEventListener('click', async () => {
        if (!confirm(buttonDescriptions.confirmLogout || 'Confirm logout?')) return;
        try {
          ['username','user','currentUser','current_user','auth','token','access_token'].forEach(k=>{ try{ localStorage.removeItem(k);}catch(e){} });
        } catch (e) {}
        try {
          await fetch('/api/logout', { method: 'POST' }).catch(()=>null);
        } catch(e){}
        window.location.href = '/login';
      });

      loadUser();

      (async function initBackground() {
        try {
          const r = await fetch('/res/share/background_config.json');
          const config = await r.json();
          if (config.enabled) {
            if (config.showBackground && config.image) {
              document.body.style.setProperty('--bg-image', `url('/res/share/${config.image}')`);
              document.body.classList.add('has-bg');
            } else {
              document.body.classList.remove('has-bg');
            }
            if (config.showTitle) {
              document.getElementById('bg-title').textContent = config.title || '';
              document.getElementById('bg-subtitle').textContent = config.subtitle || '';
              document.getElementById('titleOverlay').style.display = 'block';
            } else {
              document.getElementById('titleOverlay').style.display = 'none';
            }
          } else {
            document.getElementById('titleOverlay').style.display = 'none';
            document.body.classList.remove('has-bg');
          }
        } catch (e) {
          console.warn('Background config load failed:', e);
        }
      })();
    })();
  </script>
</body>
</html>
